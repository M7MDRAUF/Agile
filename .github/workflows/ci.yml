name: CI

on:
  push:
    branches: [main, "**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ci-test-secret-do-not-use-in-production-please-use-32-chars
      DATABASE_URL: "file:./prisma/dev.db"
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + integration tests
        run: npm run test -- --run

      - name: Push schema to dev db (for e2e/build)
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Seed dev db
        run: npm run db:seed

      - name: Build
        run: npm run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: quality
    env:
      AUTH_SECRET: ci-test-secret-do-not-use-in-production-please-use-32-chars
      DATABASE_URL: "file:./prisma/dev.db"
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Prisma generate
        run: npx prisma generate

      - name: Push schema
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Seed
        run: npm run db:seed

      - name: Build
        run: npm run build

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
